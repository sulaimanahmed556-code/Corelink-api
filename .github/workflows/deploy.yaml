# clone to VPS
# install PM2 if no pm2
# run instance with PM2

name: Deploy Corelink
on:
  push:
    branches: ["main"]

env:
  VPS_HOST: 161.97.184.247
  VPS_USER: root
  DEPLOY_DIR: /var/corelink/backend
  GIT_REPO: git@github.com:sulaimanahmed556-code/Corelink-api.git
  PRIV_KEY: ${{secrets.CORELINK_SSH_PRIV_KEY}}
  DOMAIN_NAME: app.corelink.com

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{env.PRIV_KEY}}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{env.VPS_HOST}} >> ~/.ssh/known_hosts

      - name: Make Deply DEPLOY_DIR
        run: |
          ssh ${{env.VPS_USER}}@${{env.VPS_HOST}} "mkdir -p ${{env.DEPLOY_DIR}} && cd ${{env.DEPLOY_DIR}} && mv .env /tmp/.env.backup && rm -rf ./* .[^.]* + && GIT_SSH_COMMAND='ssh -o StrictHostKeyChecking=no' git clone ${{ env.GIT_REPO }} . && mv /tmp/.env.backup .env"

      - name: Ensure Python is installed
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{env.VPS_HOST}}
          username: ${{env.VPS_USER}}
          key: ${{env.PRIV_KEY}}
          script: |

            #check python installation
            if ! command -v python3 &> /dev/null
            then 
             echo "Python not found. Installing..."
             sudo apt update
             sudo apt install python3 python3-pip python3-venv -y
            else
             echo "Python already installed:"
             python3 --version
            fi

            #clone code from git 
            cd ${{env.DEPLOY_DIR}} && python3 -m venv venv && source venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt
            
            echo "Restarting PM2..."

            if ! command -v pm2 &> /dev/null
            then
              npm install -g pm2
            fi

            pm2 delete corelink || true
            pm2 start "venv/bin/python main.py" --name corelink
            pm2 save

      - name: Setup Uvicorn, Nginx & SSL
        run: |
            ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} bash << 'EOF'
            set -e

            DEPLOY_DIR=${{ env.DEPLOY_DIR }}
            DOMAIN=${{ env.DOMAIN_NAME }}

            cd $DEPLOY_DIR

            echo "Installing Nginx if missing..."
            if ! command -v nginx >/dev/null 2>&1; then
                apt update && apt install -y nginx
            fi

            echo "Configuring Nginx reverse proxy..."

            NGINX_CONF="/etc/nginx/sites-available/$DOMAIN"

            cat > "$NGINX_CONF" << EOF_NGINX
            server {
                listen 80;
                server_name $DOMAIN;

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF_NGINX

            ln -sf "$NGINX_CONF" /etc/nginx/sites-enabled/
            nginx -t
            systemctl reload nginx

            echo "Installing Certbot if missing..."
            if ! command -v certbot >/dev/null 2>&1; then
                apt install -y certbot python3-certbot-nginx
            fi

            echo "Obtaining SSL certificate..."
            certbot --nginx -d $DOMAIN --non-interactive --agree-tos -m admin@$DOMAIN || true

            echo "Deployment complete."

            EOF
    
            